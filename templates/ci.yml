# potion-verify — adoptable CI for a potion-managed repo.
# Copy to .github/workflows/potion-verify.yml. Runs the mechanical verify
# layer (.potion/scripts/ci-verify.sh, installed by install-repo-hooks.sh)
# on every push and pull request. No key required, none shipped.

name: potion-verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mechanical:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: ratchet checks
        run: sh .potion/scripts/ci-verify.sh

